<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ShelfQuest</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header>
    <h1>ShelfQuest</h1>
    <p>Home library borrowing for small humans and tired adults.</p>
  </header>

  <nav>
    <button onclick="showTab('kiosk')">Kid Kiosk</button>
    <button onclick="showTab('admin')">Admin</button>
    <button onclick="refreshAll()">Refresh</button>
  </nav>

  <main>
    <section id="kiosk" class="tab active">
      <h2>Kid Kiosk</h2>
      <div class="grid two">
        <div class="card">
          <h3>Borrow</h3>
          <label>Child card barcode</label>
          <input id="borrow-child" placeholder="Scan child card, e.g. KID-PASCAL" autocomplete="off" />
          <label>Book ISBN or barcode</label>
          <input id="borrow-book" placeholder="Scan book ISBN" autocomplete="off" />
          <button onclick="checkout()">Borrow Book</button>
          <p id="borrow-result" class="result"></p>
        </div>

        <div class="card">
          <h3>Return</h3>
          <label>Book ISBN or barcode</label>
          <input id="return-book" placeholder="Scan book ISBN" autocomplete="off" />
          <button onclick="returnBook()">Return Book</button>
          <p id="return-result" class="result"></p>
        </div>
      </div>

      <div class="card">
        <h3>Currently Borrowed</h3>
        <table id="loans-table"></table>
      </div>
    </section>

    <section id="admin" class="tab">
      <h2>Admin</h2>
      <div class="grid two">
        <div class="card">
          <h3>Add Child</h3>
          <label>Name</label>
          <input id="child-name" placeholder="Pascal" />
          <label>Card barcode</label>
          <input id="child-barcode" placeholder="KID-PASCAL" />
          <label>Borrow limit</label>
          <input id="child-limit" type="number" value="5" />
          <button onclick="addChild()">Add Child</button>
          <p id="child-result" class="result"></p>
        </div>

        <div class="card">
          <h3>Add Book by ISBN</h3>
          <label>ISBN</label>
          <input id="isbn" placeholder="Scan ISBN" autocomplete="off" />
          <button onclick="lookupBook()">Lookup ISBN</button>
          <label>Title</label>
          <input id="book-title" />
          <label>Author</label>
          <input id="book-author" />
          <label>Cover URL</label>
          <input id="book-cover" />
          <label>Category</label>
          <input id="book-category" placeholder="Picture Books" />
          <label>Temporary barcode</label>
          <input id="book-barcode" placeholder="Defaults to ISBN" />
          <button onclick="addBook()">Add Book</button>
          <p id="book-result" class="result"></p>
        </div>
      </div>

      <div class="card">
        <h3>Children</h3>
        <table id="children-table"></table>
      </div>

      <div class="card">
        <h3>Books</h3>
        <table id="books-table"></table>
      </div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
